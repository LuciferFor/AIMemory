{% extends "base.html" %}
{% set title = "仪表盘 - AIMemory 管理后台" %}
{% set heading = "仪表盘" %}
{% set subheading = "服务概览" %}
{% block content %}
<section class="metric-grid">
  <div class="metric"><span>用户数</span><strong>{{ stats.users }}</strong></div>
  <div class="metric"><span>接口密钥</span><strong>{{ stats.api_keys }}</strong></div>
  <div class="metric"><span>有效记忆</span><strong>{{ stats.memories }}</strong></div>
  <div class="metric"><span>已删除记忆</span><strong>{{ stats.deleted_memories }}</strong></div>
</section>
{% endblock %}
