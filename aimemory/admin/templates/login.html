<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIMemory 管理后台登录</title>
  <script>
    (function () {
      try {
        document.documentElement.dataset.theme = localStorage.getItem("aimemory-admin-theme") || "dark";
      } catch (error) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
  <link rel="stylesheet" href="/admin/static/admin.css?v={{ admin_asset_version }}">
</head>
<body class="login-body">
  <main class="login-panel">
    <div class="brand login-brand">
      <span class="brand-mark">A</span>
      <span>AIMemory 管理后台</span>
    </div>
    <h1>管理员登录</h1>
    {% if error %}<div class="notice error">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login" class="form-stack">
      <input type="hidden" name="next" value="{{ next_url }}">
      <label>
        用户名
        <input name="username" autocomplete="username" required>
      </label>
      <label>
        密码
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit" class="primary">登录</button>
    </form>
  </main>
</body>
</html>
